version: "3.9"

services:
  mcp-server:
    build: .
    command: uvicorn mcp_server:app --host 0.0.0.0 --port ${MCP_PORT:-9003}
    environment:
      MCP_1C_BASE: ${MCP_1C_BASE:-}
      ONEC_USERNAME: ${ONEC_USERNAME:-}
      ONEC_PASSWORD: ${ONEC_PASSWORD:-}
    ports:
      - "${MCP_PORT:-9003}:${MCP_PORT:-9003}"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gradio-app:
    build: .
    command: python gradio_app.py
    environment:
      MCP_URL: http://mcp-server:${MCP_PORT:-9003}
      GRADIO_PORT: ${GRADIO_PORT:-7860}
      LLM_SERVER_URL: ${LLM_SERVER_URL:-http://host.docker.internal:8000/v1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-empty}
    ports:
      - "${GRADIO_PORT:-7860}:${GRADIO_PORT:-7860}"
    depends_on:
      - mcp-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
